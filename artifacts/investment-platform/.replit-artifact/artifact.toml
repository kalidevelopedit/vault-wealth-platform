kind = "web"
previewPath = "/"
title = "Investment Platform"
version = "1.0.0"
id = "artifacts/investment-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22767

[services.development]
run = "pnpm --filter @workspace/investment-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/investment-platform", "run", "build" ]
publicDir = "artifacts/investment-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22767"
BASE_PATH = "/"
