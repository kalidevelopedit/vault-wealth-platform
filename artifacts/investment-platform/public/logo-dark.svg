<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 44" fill="none">
  <!-- Bar chart icon -->
  <rect x="2" y="20" width="6" height="22" rx="1.5" fill="#0d1520"/>
  <rect x="11" y="12" width="6" height="30" rx="1.5" fill="#0d1520"/>
  <rect x="20" y="6" width="6" height="36" rx="1.5" fill="#0d1520"/>
  <!-- Diagonal upward trend line -->
  <line x1="2" y1="28" x2="26" y2="8" stroke="#0d1520" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <!-- INT text -->
  <text x="34" y="32" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="20" font-weight="800" fill="#0d1520" letter-spacing="-0.5">INT</text>
  <!-- BROKERS text -->
  <text x="68" y="32" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="20" font-weight="400" fill="#0d1520" opacity="0.75" letter-spacing="1.5">BROKERS</text>
</svg>
